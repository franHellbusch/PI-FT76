<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet" />
    <!-- Mi css -->
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Proyecto FT76</title>
  </head>

  <body>
    <header>
      <nav class="nav">
        <span class="nav__logo">Colorfly Studio</span>
        <ul class="nav__links">
          <li><a class="nav__link" href="#generador">Generador</a></li>
          <li><a class="nav__link" href="#guardadas">Guardadas</a></li>
        </ul>
      </nav>
    </header>

    <!-- Navegacion principal -->

    <!-- Contenido principal del generador -->
    <main>
      <section id="generador">
        <h2>Generar paleta</h2>

        <section class="galeria">
          <article class="swatch">
            <div class="swatch__color"></div>
            <div class="swatch__info">
              <p class="swatch__nombre">Primario</p>
              <p class="swatch__codigo">#ec3a8b · hsl(330, 85%, 55%)</p>
            </div>
          </article>

          <article class="swatch">
            <div class="swatch__color swatch__color--claro"></div>
            <div class="swatch__info">
              <p class="swatch__nombre">Primario claro</p>
              <p class="swatch__codigo">#f37bb1 · hsl(330, 85%, 72%)</p>
            </div>
          </article>

          <article class="swatch">
            <div class="swatch__color swatch__color--oscuro"></div>
            <div class="swatch__info">
              <p class="swatch__nombre">Primario oscuro</p>
              <p class="swatch__codigo">#b3196a · hsl(330, 75%, 40%)</p>
            </div>
          </article>

          <article class="swatch" tabindex="0">
            <div class="swatch__color swatch__color--acento"></div>
            <div class="swatch__info">
              <p class="swatch__nombre">Acento</p>
              <p class="swatch__codigo">#0db4da · hsl(190, 90%, 45%)</p>
            </div>
          </article>
        </section>
      </section>
    </main>

    <footer>
      <p>Colorfly Studio &copy; 2026</p>
    </footer>
  </body>
</html>
